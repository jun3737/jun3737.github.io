<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>땡큐몰</title>
  <style>
    * {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
      font-family: 'Apple SD Gothic Neo', 'Malgun Gothic', sans-serif;
    }

    body {
      width: 100%;
      min-height: 100vh;
      display: flex;
      justify-content: center;
      align-items: center;
      background: linear-gradient(180deg, #f3f7fa 0%, #e8f0f5 100%);
      padding: 0 20px 40px;
    }

    .container {
      width: 100%;
      max-width: 430px;
      background: white;
      border-radius: 28px;
      box-shadow: 0 10px 30px rgba(0,0,0,0.08);
      padding: 55px 22px;
      text-align: center;
      border: 2px solid #c9d8e4;
    }

    .mall-name {
      font-size: 34px;
      font-weight: 900;
      color: #0d395a;
      letter-spacing: -1px;
      margin-bottom: 32px;
    }

    .mall-desc {
      font-size: 13px;
      color: #888;
      letter-spacing: 2px;
      margin-bottom: 28px;
    }

    .title {
      font-size: 27px;
      font-weight: 800;
      color: #2d3b45;
      line-height: 1.5;
      margin-bottom: 18px;
      word-break: keep-all;
    }

    .title strong {
      color: #0d395a;
    }

    .sub {
      font-size: 15px;
      color: #5f6b75;
      line-height: 1.7;
      word-break: keep-all;
    }

    @media (max-width: 480px) {
      .mall-name {
        font-size: 30px;
      }

      .title {
        font-size: 23px;
      }

      .sub {
        font-size: 14px;
      }
    }
  </style>
</head>
<body>
  <div class="container">
    <div class="mall-name">땡큐몰</div>
    <div class="title"><strong>주문접수</strong>가<br>마감되었습니다</div>
    <div class="sub">많은 관심과 이용 감사드립니다.<br>다음 판매 일정에 다시 찾아주세요.</div>
  </div>
</body>
</html>
